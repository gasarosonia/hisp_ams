version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hisp_ams_db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-12345}
      POSTGRES_DB: ${DATABASE_NAME:-hisp_ams}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ams-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hisp_ams_backend
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-12345}
      DATABASE_NAME: ${DATABASE_NAME:-hisp_ams}
      JWT_SECRET: ${JWT_SECRET:-secret}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - ams-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hisp_ams_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ams-network

networks:
  ams-network:
    driver: bridge

volumes:
  postgres_data:
